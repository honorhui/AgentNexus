<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — Nexus Protocol</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box }
  body { background:#0a0e14; color:#c8d6e5; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center }
  .box { max-width:480px; padding:40px }
  .code { font-size:6em; font-weight:700; color:#2ecc71; font-family:'SF Mono',Consolas,monospace; line-height:1 }
  .msg { font-size:1.2em; color:#fff; margin:16px 0 8px }
  .sub { color:#5c6e8a; font-size:.88em; margin-bottom:32px; line-height:1.6 }
  .btn { display:inline-block; padding:10px 28px; background:#2ecc71; color:#000; text-decoration:none; border-radius:8px; font-weight:600; font-size:.9em; transition:.2s }
  .btn:hover { background:#1a7a3f }
</style>
</head>
<body>
<div class="box">
  <div class="code">404</div>
  <div class="msg">这个 DID 不存在</div>
  <div class="sub">你访问的页面在 Nexus 网络中未注册。<br>也许它从未存在，也许它已被遗忘。</div>
  <a class="btn" href="/">← 返回光之门</a>
</div>
</body>
</html>
