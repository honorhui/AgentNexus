<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 2048">
  <defs>
    <!-- 主渐变：翡翠绿 -->
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2ECC71"/>
      <stop offset="50%" stop-color="#27AE60"/>
      <stop offset="100%" stop-color="#1e8c4e"/>
    </linearGradient>
    <!-- 外发光 -->
    <filter id="outer" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.18  0 0 0 0 0.80  0 0 0 0 0.44  0 0 0 0.25 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 内发光 -->
    <filter id="inner" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.18  0 0 0 0 0.80  0 0 0 0 0.44  0 0 0 0.15 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 点发光 -->
    <filter id="dot" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.18  0 0 0 0 0.80  0 0 0 0 0.44  0 0 0 0.4 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ═══ 六边形外框 ═══ -->
  <!-- 主框 -->
  <polygon points="1024,144 1848,592 1848,1456 1024,1904 200,1456 200,592"
           fill="none" stroke="url(#green)" stroke-width="64" stroke-linejoin="round"
           filter="url(#outer)"/>
  <!-- 内框 — 增加层次感 -->
  <polygon points="1024,176 1816,608 1816,1440 1024,1872 232,1440 232,608"
           fill="none" stroke="url(#green)" stroke-width="48" stroke-linejoin="round"
           filter="url(#inner)" opacity="0.55"/>

  <!-- ═══ N 字母 ═══ -->
  <g filter="url(#outer)">
    <!-- 左竖 -->
    <rect x="472" y="600" width="280" height="848" rx="32" fill="url(#green)"/>
    <!-- 右竖 -->
    <rect x="1296" y="600" width="280" height="848" rx="32" fill="url(#green)"/>
    <!-- 斜杠 -->
    <polygon points="472,600 752,600 1576,1448 1296,1448" fill="url(#green)"/>
  </g>

  <!-- N 内高光线 -->
  <rect x="488" y="616" width="248" height="816" rx="28" fill="none" stroke="#3ddb7e" stroke-width="4" opacity="0.3"/>
  <rect x="1312" y="616" width="248" height="816" rx="28" fill="none" stroke="#3ddb7e" stroke-width="4" opacity="0.3"/>
  <polygon points="488,616 736,616 1560,1432 1312,1432" fill="none" stroke="#3ddb7e" stroke-width="4" opacity="0.2"/>

  <!-- ═══ 顶点节点 ═══ -->
  <g filter="url(#dot)">
    <!-- 顶 -->
    <circle cx="1024" cy="144" r="48" fill="#2ECC71"/>
    <!-- 右上 -->
    <circle cx="1848" cy="592" r="36" fill="#2ECC71" opacity="0.35"/>
    <!-- 右下 -->
    <circle cx="1848" cy="1456" r="36" fill="#2ECC71" opacity="0.35"/>
    <!-- 底 -->
    <circle cx="1024" cy="1904" r="48" fill="#2ECC71"/>
    <!-- 左下 -->
    <circle cx="200" cy="1456" r="36" fill="#2ECC71" opacity="0.35"/>
    <!-- 左上 -->
    <circle cx="200" cy="592" r="36" fill="#2ECC71" opacity="0.35"/>
  </g>

  <!-- 顶点核心亮点 -->
  <circle cx="1024" cy="144" r="20" fill="#3ddb7e"/>
  <circle cx="1024" cy="1904" r="20" fill="#3ddb7e"/>
  <circle cx="1848" cy="592" r="14" fill="#3ddb7e" opacity="0.5"/>
  <circle cx="1848" cy="1456" r="14" fill="#3ddb7e" opacity="0.5"/>
  <circle cx="200" cy="1456" r="14" fill="#3ddb7e" opacity="0.5"/>
  <circle cx="200" cy="592" r="14" fill="#3ddb7e" opacity="0.5"/>

</svg>
